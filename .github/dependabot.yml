version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    # Look for a `package.json` and `package-lock.json` in the root directory
    directory: "/"
    # Check the npm registry for updates every week
    schedule:
      interval: "weekly"
    # (Optional) Assign PRs to yourself so you get notified immediately
    reviewers:
      - "CodeVoyager210"
